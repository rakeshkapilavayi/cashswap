services:
  - type: web
    name: cashswap-chatbot
    runtime: python
    rootDir: python-chatbot
    buildCommand: pip install -r requirements.txt && python preload_model.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
    plan: free

  - type: web
    name: cashswap-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
    plan: free
